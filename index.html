<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Box Mockup — Generator</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📦</text></svg>" />
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="brand">
                <h1>📦 Box Mockup</h1>
                <p>En vivo · Sobre el PSD real</p>
            </div>

            <!-- Texto -->
            <div class="panel">
                <div class="panel-header">📝 Texto</div>
                <div class="field">
                    <label>Título</label>
                    <input type="text" id="front-title" value="Product Name" />
                </div>
                <div class="field">
                    <label>Subtítulo</label>
                    <input type="text" id="front-subtitle" value="Premium Quality" />
                </div>
                <div class="field">
                    <label>Badge</label>
                    <input type="text" id="front-badge" value="NEW" />
                </div>
                <div class="field">
                    <label>Descripción</label>
                    <input type="text" id="front-desc" value="The best solution for your business" />
                </div>
                <div class="field">
                    <label>Texto Lateral</label>
                    <input type="text" id="side-text" value="PRODUCT" />
                </div>
            </div>

            <!-- Colores -->
            <div class="panel">
                <div class="panel-header">🎨 Colores</div>
                <div class="color-row">
                    <div class="color-field">
                        <label>Fondo Frontal</label>
                        <input type="color" id="front-bg" value="#1a1a3e" />
                    </div>
                    <div class="color-field">
                        <label>Fondo Lateral</label>
                        <input type="color" id="side-bg" value="#ff6b35" />
                    </div>
                </div>
                <div class="color-row">
                    <div class="color-field">
                        <label>Acento</label>
                        <input type="color" id="front-accent" value="#ff6b35" />
                    </div>
                    <div class="color-field">
                        <label>Fondo Escena</label>
                        <input type="color" id="scene-bg" value="#f0ebe3" />
                    </div>
                </div>
                <div class="color-row">
                    <div class="color-field">
                        <label>Color Título</label>
                        <input type="color" id="front-title-color" value="#ffffff" />
                    </div>
                    <div class="color-field">
                        <label>Color Subtítulo</label>
                        <input type="color" id="front-subtitle-color" value="#cccccc" />
                    </div>
                </div>
                <div class="color-row">
                    <div class="color-field">
                        <label>Color Badge</label>
                        <input type="color" id="front-badge-color" value="#ffffff" />
                    </div>
                    <div class="color-field">
                        <label>Color Lateral</label>
                        <input type="color" id="side-text-color" value="#ffffff" />
                    </div>
                </div>
                <div class="color-row">
                    <div class="color-field">
                        <label>Color Descripción</label>
                        <input type="color" id="front-desc-color" value="#aaaaaa" />
                    </div>
                    <div class="color-field">
                    </div>
                </div>
            </div>

            <!-- Vertical Position -->
            <div class="panel">
                <div class="panel-header">↕️ Posición Vertical</div>
                <div class="field">
                    <label>Ajustar posición del texto: <span id="pos-label">0</span></label>
                    <input type="range" id="pos-offset" min="-100" max="100" value="0" />
                    <div class="range-labels">
                        <span>Arriba</span>
                        <span>Abajo</span>
                    </div>
                </div>
            </div>

            <!-- Actions -->
            <div class="actions">
                <button id="btn-export" class="btn btn-primary">
                    📥 Exportar PNG (4000×3500)
                </button>
                <button id="btn-reset" class="btn btn-secondary">
                    🔄 Restaurar
                </button>
            </div>

            <div class="footer">
                Basado en MockupCaja.psd — Coordenadas exactas del PSD
            </div>
        </aside>

        <!-- Preview -->
        <main class="preview">
            <canvas id="canvas"></canvas>
            <div id="loading" class="loading">
                <div class="spinner"></div>
            </div>
        </main>
    </div>

    <div id="toast" class="toast"></div>

    <script src="app.js"></script>
</body>
</html>
